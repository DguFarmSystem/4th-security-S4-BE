name: Test on PR to develop

on:
  pull_request:
    branches:
      - develop # develop 브랜치로의 Pull Request 발생 시

jobs:
  test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read # GitHub 리포지토리의 코드에 접근 권한

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 리포지토리 코드 체크아웃

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew # gradlew 실행 권한 부여

      - name: Build with Gradle
        run: ./gradlew build
#        run: ./gradlew test # 테스트만 실행